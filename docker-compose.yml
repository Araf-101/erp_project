services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - APP_KEY=base64:Q1m5j35HdvfEYGgJkUOl6b0M0qQJ7zgS7w3lB3R3NZo=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=erp_db
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: erp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: erp_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306" # Host port 3307 to avoid conflict
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  # ==================== Lightweight DB Admin ====================
  adminer:
    image: adminer:latest
    container_name: erp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080" # Access at http://localhost:8080
    environment:
      ADMINER_DEFAULT_SERVER: db # Auto-connect to your db service
      ADMINER_DEFAULT_DB: erp_db
    depends_on:
      db:
        condition: service_healthy
volumes:
  db_data:
